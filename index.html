  render();
}

  var label = lang==="ko" ? "English" : "한국어";
  return '<button onclick="toggleLang()" style="position:fixed;top:12px;right:12px;z-index:999;padding:6px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);font-size:12px;font-weight:700;color:rgba(255,255,255,.8);cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,.2)">' + label + '</button>';
}

function secTitle(id){
  return lang==="en" ? EN_MINI.sections[id] : SECTIONS.find(s=>s.id===id).title;
}
function getQ_mini(secIdx, qIdx){
  if(lang==="en"){
    var sid = SECTIONS[secIdx].id;
    return EN_MINI.questions[sid][qIdx];
  }
  return SECTIONS[secIdx].qs[qIdx];
}
function getScale_mini(idx){
  return lang==="en" ? EN_MINI.scale[idx] : SCALE[idx].t;
}
function M(key, fallback){
  return (lang==="en" && EN_MINI[key]) ? EN_MINI[key] : fallback;
}
// ===== end i18n =====


  const SECTIONS = [
    {id:"A", em:"⚡", title:"충동", qs:[
      "공부를 시작해도 10~15분 안에 다른 걸 하고 싶어진다.",
      "폰이 근처에 있으면 집중이 쉽게 깨진다."
    ]},
    {id:"B", em:"🌊", title:"불안", qs:[
      "완벽히 준비되지 않으면 시작이 어렵다.",
      "시험이나 평가 생각만 해도 긴장된다."
    ]},
    {id:"C", em:"🔋", title:"동기", qs:[
      "공부해도 크게 달라질 것 같지 않다.",
      "스스로 시작하기보다 누가 시켜야 움직인다."
    ]},
    {id:"D", em:"🐌", title:"회피", qs:[
      "해야 할 시간이 되면 딴 행동이 늘어난다.",
      "“5분만 쉬자”가 길어지는 일이 많다."
    ]},
    {id:"E", em:"🧩", title:"전략", qs:[
      "배운 내용을 내 말로 바꿔 설명하기 어렵다.",
      "틀린 문제의 원인을 스스로 분석하기보다 답만 확인한다."
    ]},
  ];

  const app = document.getElementById("app");

  let phase = "intro"; // intro | test | result
  let idx = 0;         // 0..9
  let answers = {};    // {0:0..3,...}
  let parentMode = false;

  function totalAnswered(){ return Object.keys(answers).length; }
  function pct(){
    // "진행률"은 현재 문항 기준으로 보여주는 게 직관적이라 idx 기반으로 표시
    return Math.round((idx/10)*100);
  }

  function levelFromScore(sc){
    if(sc >= 5) return {k:lang==="en"?"Needs Focus":"집중 관리 필요", cls:"bad"};
    if(sc >= 3) return {k:lang==="en"?"Check Needed":"점검 필요", cls:"mid"};
    return {k:lang==="en"?"Stable":"안정", cls:"ok"};
  }

  function computeScores(){
    const scores = {};
    SECTIONS.forEach((s, si)=>{
      const a0 = answers[si*2] ?? 0;
      const a1 = answers[si*2+1] ?? 0;
      scores[s.id] = a0 + a1; // 0..6
    });
    return scores;
  }

  function goBack(){
    if(phase==="test"){
      if(idx>0){
        idx--;
        render();
      } else {
        phase="intro";
        render();
      }
      return;
    }
    if(phase==="result"){
      phase="test";
      idx = 9;
      render();
    }
  }

  function restart(){
    phase="intro";
    idx=0;
    answers={};
    parentMode=false;
    render();
  }

  function goFull(){
    const payload = { ts: Date.now(), answers, scores: computeScores(), parentMode };
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); }catch(e){}
    showFullModal();
  }

  function showFullModal(){
    const isEn = lang === "en";
    const overlay = document.createElement("div");
    overlay.id = "fullModalOverlay";

// ===== 5분 미션(2개 중 선택) : Top1/Top2 기반 =====
function missionFor(id){
  if(lang==="en"){
    const enMap = {A:"Impulse",B:"Anxiety",C:"Drive",D:"Avoidance",E:"Strategy"};
    const key = enMap[id] || id;
    return EN_MINI.missions[key] || EN_MINI.missions["default"];
  }
  const map = {
    A: {title:"⚡ 충동 · 5분 몰입 시작", text:"휴대폰을 다른 방에 두고 타이머 5분을 설정하세요. 한 문제만 끝까지 푸는 데 집중해보세요."},
    D: {title:"🐌 회피 · 시작 마찰 제거", text:"첫 5분에 풀 문제 3개를 미리 표시해두세요. 타이머 5분 동안은 그 문제만 붙잡아보세요."},
    B: {title:"🌊 불안 · 기준 낮추고 완료", text:"가장 쉬운 문제 1개를 고르세요. 5분 동안은 '완벽'이 아니라 '끝까지'만 목표로 해보세요."},
    E: {title:"🧩 전략 · 내 말로 바꾸기", text:"오늘 배운 내용 하나를 골라, 교과서를 덮고 내 말로 2문장으로 설명해보세요. 막히는 부분이 진짜 약점이에요."},
    C: {title:"🔥 동기 · 성취감 점화", text:"가장 짧은 단원 하나를 고르고, 5분 동안 '아는 것 3가지'를 적어보세요."}
  };
  return map[id] || {title:"✅ 기본 · 5분 시작", text:"타이머 5분을 켜고, 가장 쉬운 문제 1개를 끝까지 풀어보세요."};
}

function renderMissions(primaryId, secondaryId){
  const container = document.getElementById("missionBox");
  if(!container) return;

  const m1 = missionFor(primaryId);
  const m2 = (secondaryId && secondaryId !== primaryId)
    ? missionFor(secondaryId)
    : (lang==="en" ? EN_MINI.missions["supplement"] : {title:"✅ 보완 · 5분 유지", text:"타이머 5분을 켜고, 방금 푼 내용을 스스로 2문장으로 설명해보세요."});

  container.innerHTML = `
    <div class="card">
      <div class="h2">${M("missionTitle","🎯 오늘의 5분 미션")} <span class="tiny" style="opacity:.7">${M("missionSub","· 둘 중 하나만 선택")}</span></div>
      <div class="sp12"></div>
      <div class="missionWrap">
        <div class="missionTitle">${M("missionPick","둘 중 하나만 선택해서 오늘 바로 해보세요")}</div>
        <div class="missionGrid">
          <button class="missionCard selected" type="button" data-m="0">
            <div class="missionHead">${m1.title}</div>
            <div class="missionText">${m1.text}</div>
          </button>
          <button class="missionCard" type="button" data-m="1">
            <div class="missionHead">${m2.title}</div>
            <div class="missionText">${m2.text}</div>
          </button>
        </div>
        <div class="missionHint">${M("missionHint","✔ 5분만 해도 실행 흐름이 달라질 수 있어요.")}</div>
      </div>
    </div>
  `;

  container.querySelectorAll(".missionCard").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      container.querySelectorAll(".missionCard").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      const head = btn.querySelector(".missionHead");
      const hint = container.querySelector(".missionHint");
      if(hint && head){
        hint.innerHTML = "✅ <b>" + head.textContent + "</b> " + (lang==="en" ? "selected! Remember how you feel after 5 minutes 🧠" : "선택 완료! 5분 후 어떻게 달라졌는지 기억해두세요 🧠");
        hint.style.color = "rgba(185,255,214,.85)";
      }
    });
  });
}

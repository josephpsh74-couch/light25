  function levelFromScore(sc){
    if(sc >= 5) return {k:lang==="en"?"Needs Focus":"집중 관리 필요", cls:"bad"};
    if(sc >= 3) return {k:lang==="en"?"Check Needed":"점검 필요", cls:"mid"};
    return {k:lang==="en"?"Stable":"안정", cls:"ok"};
  }

  function computeScores(){
    const scores = {};
    SECTIONS.forEach((s, si)=>{
      const a0 = answers[si*2] ?? 0;
      const a1 = answers[si*2+1] ?? 0;
      scores[s.id] = a0 + a1; // 0..6
    });
    return scores;
  }

  function goBack(){
    if(phase==="test"){
      if(idx>0){
        idx--;
        render();
      } else {
        phase="intro";
        render();
      }
      return;
    }
    if(phase==="result"){
      phase="test";
      idx = 9;
      render();
    }
  }

  function restart(){
    phase="intro";
    idx=0;
    answers={};
    parentMode=false;
    render();
  }

    D: {title:"🐌 회피 · 시작 마찰 제거", text:"첫 5분에 풀 문제 3개를 미리 표시해두세요. 타이머 5분 동안은 그 문제만 붙잡아보세요."},
    B: {title:"🌊 불안 · 기준 낮추고 완료", text:"가장 쉬운 문제 1개를 고르세요. 5분 동안은 '완벽'이 아니라 '끝까지'만 목표로 해보세요."},
    E: {title:"🧩 전략 · 내 말로 바꾸기", text:"오늘 배운 내용 하나를 골라, 교과서를 덮고 내 말로 2문장으로 설명해보세요. 막히는 부분이 진짜 약점이에요."},
    C: {title:"🔥 동기 · 성취감 점화", text:"가장 짧은 단원 하나를 고르고, 5분 동안 '아는 것 3가지'를 적어보세요."}
  };
  return map[id] || {title:"✅ 기본 · 5분 시작", text:"타이머 5분을 켜고, 가장 쉬운 문제 1개를 끝까지 풀어보세요."};
}

function renderMissions(primaryId, secondaryId){
  const container = document.getElementById("missionBox");
  if(!container) return;

  const m1 = missionFor(primaryId);
  const m2 = (secondaryId && secondaryId !== primaryId)
    ? missionFor(secondaryId)
    : (lang==="en" ? EN_MINI.missions["supplement"] : {title:"✅ 보완 · 5분 유지", text:"타이머 5분을 켜고, 방금 푼 내용을 스스로 2문장으로 설명해보세요."});

  container.innerHTML = `
    <div class="card">
      <div class="h2">${M("missionTitle","🎯 오늘의 5분 미션")} <span class="tiny" style="opacity:.7">${M("missionSub","· 둘 중 하나만 선택")}</span></div>
      <div class="sp12"></div>
      <div class="missionWrap">
        <div class="missionTitle">${M("missionPick","둘 중 하나만 선택해서 오늘 바로 해보세요")}</div>
        <div class="missionGrid">
          <button class="missionCard selected" type="button" data-m="0">
            <div class="missionHead">${m1.title}</div>
            <div class="missionText">${m1.text}</div>
          </button>
          <button class="missionCard" type="button" data-m="1">
            <div class="missionHead">${m2.title}</div>
            <div class="missionText">${m2.text}</div>
          </button>
        </div>
        <div class="missionHint">${M("missionHint","✔ 5분만 해도 실행 흐름이 달라질 수 있어요.")}</div>
      </div>
    </div>
  `;

  container.querySelectorAll(".missionCard").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      container.querySelectorAll(".missionCard").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      const head = btn.querySelector(".missionHead");
      const hint = container.querySelector(".missionHint");
      if(hint && head){
        hint.innerHTML = "✅ <b>" + head.textContent + "</b> " + (lang==="en" ? "selected! Remember how you feel after 5 minutes 🧠" : "선택 완료! 5분 후 어떻게 달라졌는지 기억해두세요 🧠");
        hint.style.color = "rgba(185,255,214,.85)";
      }
    });
  });
}

// ===== 결과 공유 카드 생성 =====
function generateShareCard(typeId, typeName, typeEm, typeColor) {
  const canvas = document.getElementById("shareCanvas");
  if(!canvas) return;

  // ── 레이아웃 상수 ──────────────────────────────
  const W = 900, H = 1080;   // 정사각형에 가깝게 → 모바일 비율 최적
  const PAD = 56;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  // ① 배경 그라데이션
  const bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#0a0f1e");
  bg.addColorStop(0.55,"#0f0c29");
  bg.addColorStop(1,"#131830");
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // ② 유형 색상 글로우 (우상단)
  const glow = ctx.createRadialGradient(W,0,0,W,0,520);
  glow.addColorStop(0, typeColor+"55");
  glow.addColorStop(0.5, typeColor+"18");
  glow.addColorStop(1, "transparent");
  ctx.fillStyle = glow; ctx.fillRect(0,0,W,H);

  // ③ 상단 컬러 바
  const topBar = ctx.createLinearGradient(0,0,W,0);
  topBar.addColorStop(0, typeColor);
  topBar.addColorStop(0.6, typeColor+"aa");
  topBar.addColorStop(1, "transparent");
  ctx.fillStyle = topBar; ctx.fillRect(0,0,W,6);

  // ④ 브랜드 + 소제목 ─────────────────────────────
  let y = 56;
  // 브랜드 pill
  ctx.fillStyle = "rgba(255,255,255,.10)";
  roundRect(ctx, PAD, y, 260, 48, 24); ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,.18)"; ctx.lineWidth = 1;
  roundRect(ctx, PAD, y, 260, 48, 24); ctx.stroke();
  ctx.fillStyle = "rgba(255,255,255,.85)";
  ctx.font = "700 20px -apple-system,sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("🧠 NEUROSTUDY LAB", PAD+18, y+31);

  // 소제목
  y += 80;
  ctx.fillStyle = "rgba(255,255,255,.45)";
  ctx.font = "500 24px -apple-system,sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("나의 공부체력 유형 진단 결과", PAD, y);

  // ⑤ 유형 카드 (메인 블록) ────────────────────────
  y += 20;
  const cardH = 220;
  // 카드 배경
  const cardBg = ctx.createLinearGradient(PAD, y, W-PAD, y+cardH);
  cardBg.addColorStop(0, typeColor+"28");
  cardBg.addColorStop(1, typeColor+"08");
  ctx.fillStyle = cardBg;
  roundRect(ctx, PAD, y, W-PAD*2, cardH, 24); ctx.fill();
  ctx.strokeStyle = typeColor+"55"; ctx.lineWidth = 1.5;
  roundRect(ctx, PAD, y, W-PAD*2, cardH, 24); ctx.stroke();

  // 이모지
  ctx.font = "90px -apple-system,sans-serif";
  ctx.textAlign = "left";
  ctx.fillText(typeEm, PAD+28, y+128);

  // 유형명 — 동적 폰트 크기
  let fs = 72;
  ctx.font = `900 ${fs}px -apple-system,sans-serif`;
  const maxNameW = W - PAD*2 - 150;
  while(ctx.measureText(typeName).width > maxNameW && fs > 40) {
    fs -= 3;
    ctx.font = `900 ${fs}px -apple-system,sans-serif`;
  }
  ctx.fillStyle = "#fff";
  ctx.textAlign = "left";
  ctx.fillText(typeName, PAD+148, y+90);

  // 유형 배지
  const badgeW = 140, badgeH = 44;
  ctx.fillStyle = typeColor+"33";
  roundRect(ctx, PAD+148, y+108, badgeW, badgeH, 22); ctx.fill();
  ctx.strokeStyle = typeColor+"88"; ctx.lineWidth = 1;
  roundRect(ctx, PAD+148, y+108, badgeW, badgeH, 22); ctx.stroke();
  ctx.fillStyle = typeColor;
  ctx.font = "700 20px -apple-system,sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("주요 유형", PAD+148+badgeW/2, y+136);

  // ⑥ 핵심 인사이트 ──────────────────────────────
  y += cardH + 36;
  const ebData = window.EBOOK_DATA ? EBOOK_DATA[typeId] : null;
  // 짧은 인사이트: 첫 40자만 사용
  let insight = ebData ? ebData.insight.ko : "공부가 안 되는 건 의지의 문제가 아닙니다.";
  // 2줄 이내로 자르기 (약 42자)
  if(insight.length > 50) insight = insight.slice(0,50) + "...";

  ctx.fillStyle = "rgba(255,255,255,.06)";
  roundRect(ctx, PAD, y, W-PAD*2, 110, 18); ctx.fill();
  // 왼쪽 컬러 선
  ctx.fillStyle = typeColor;
  ctx.fillRect(PAD, y, 5, 110);

  ctx.fillStyle = "rgba(255,255,255,.42)";
  ctx.font = "600 20px -apple-system,sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("💡 핵심 인사이트", PAD+22, y+34);

  ctx.fillStyle = "rgba(255,255,255,.88)";
  ctx.font = "500 26px -apple-system,sans-serif";
  wrapText(ctx, insight, PAD+22, y+72, W-PAD*2-40, 34);

  // ⑦ 5개 영역 점수 바 ───────────────────────────
  y += 110 + 40;
  ctx.fillStyle = "rgba(255,255,255,.55)";
  ctx.font = "700 24px -apple-system,sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("공부체력 5개 영역", PAD, y);

  y += 16;
  const dims = [
    {id:"A", em:"⚡", label:"충동",  color:"#FF6B6B"},
    {id:"B", em:"🌊", label:"불안",  color:"#4ECDC4"},
    {id:"C", em:"🔋", label:"동기",  color:"#FFD93D"},
    {id:"D", em:"🐌", label:"회피",  color:"#A78BFA"},
    {id:"E", em:"🧩", label:"전략",  color:"#F97316"},
  ];
  const scores = computeScores();
  const LABEL_W = 120, SCORE_W = 60, BAR_H = 22, ROW_H = 50;
  const barX = PAD + LABEL_W;
  const barW = W - PAD*2 - LABEL_W - SCORE_W - 12;

  dims.forEach((d,i) => {
    const ry = y + i*ROW_H;
    const sc = scores[d.id] || 0;
    const pct = sc / 6;
    const isTop = d.id === typeId;

    // 주요 유형 하이라이트 배경
    if(isTop) {
      ctx.fillStyle = "rgba(255,255,255,.04)";
      roundRect(ctx, PAD-8, ry+2, W-PAD*2+16, ROW_H-4, 10); ctx.fill();
    }

    // 레이블
    ctx.fillStyle = isTop ? "#fff" : "rgba(255,255,255,.65)";
    ctx.font = isTop ? "700 22px -apple-system,sans-serif" : "500 21px -apple-system,sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(`${d.em} ${d.label}`, PAD, ry+ROW_H/2+8);

    // 바 배경
    ctx.fillStyle = "rgba(255,255,255,.08)";
    roundRect(ctx, barX, ry+(ROW_H-BAR_H)/2, barW, BAR_H, BAR_H/2); ctx.fill();

    // 바 채우기
    if(pct > 0) {
      const fw = Math.max(BAR_H, barW*pct);
      const barGrad = ctx.createLinearGradient(barX,0,barX+fw,0);
      barGrad.addColorStop(0, d.color+"99");
      barGrad.addColorStop(1, d.color);
      ctx.fillStyle = barGrad;
      roundRect(ctx, barX, ry+(ROW_H-BAR_H)/2, fw, BAR_H, BAR_H/2); ctx.fill();
    }

    // 점수
    ctx.fillStyle = isTop ? d.color : "rgba(255,255,255,.45)";
    ctx.font = isTop ? "700 22px -apple-system,sans-serif" : "500 20px -apple-system,sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(`${sc}/6`, W-PAD, ry+ROW_H/2+8);
  });

  // ⑧ 구분선
  y += dims.length * ROW_H + 28;
  ctx.strokeStyle = "rgba(255,255,255,.08)"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W-PAD, y); ctx.stroke();
  y += 28;

  // ⑨ CTA 버튼
  const ctaGrad = ctx.createLinearGradient(PAD,y,W-PAD,y);
  ctaGrad.addColorStop(0,"#4ECDC4");
  ctaGrad.addColorStop(0.5,"#A78BFA");
  ctaGrad.addColorStop(1,"#FF6B6B");
  ctx.fillStyle = ctaGrad;
  roundRect(ctx, PAD, y, W-PAD*2, 76, 38); ctx.fill();

  ctx.fillStyle = "#0a0f1e";
  ctx.font = "800 28px -apple-system,sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("📖 전자책 + 무료 진단 패키지 받기", W/2, y+47);

  // ⑩ 하단 URL
  ctx.fillStyle = "rgba(255,255,255,.28)";
  ctx.font = "500 19px -apple-system,sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("josephpsh74-couch.github.io/light25  ·  kmong.com/gig/747652", W/2, H-30);

  showShareModal(canvas.toDataURL("image/png"), typeName, typeEm);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(''); let line=''; let curY=y;
  for(let i=0;i<words.length;i++){
    const test=line+words[i];
    if(ctx.measureText(test).width>maxW&&line!==''){ctx.fillText(line,x,curY);line=words[i];curY+=lineH;}
    else{line=test;}
  }
  if(line)ctx.fillText(line,x,curY);
}

function showShareModal(imgUrl,typeName,typeEm){
  const ex=document.getElementById("shareModal"); if(ex)ex.remove();
  const modal=document.createElement("div");
  modal.id="shareModal";
  modal.innerHTML=`
    <div class="modal-inner">
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:32px;margin-bottom:6px">${typeEm}</div>
        <div style="font-size:18px;font-weight:950;color:#fff">${typeName} 유형 카드</div>
        <div style="font-size:13px;color:rgba(255,255,255,.5);margin-top:4px">이미지를 길게 눌러 저장하세요</div>
      </div>
      <img src="${imgUrl}" style="width:100%;border-radius:16px;border:1px solid rgba(255,255,255,.1);margin-bottom:16px"/>
      <a href="${imgUrl}" download="나의_공부체력_유형_${typeName}.png" style="
        display:block;width:100%;text-align:center;
        background:linear-gradient(135deg,#4ecdc4,#a78bfa);
        border:none;border-radius:999px;padding:14px;
        font-weight:950;font-size:15px;color:#0f0c29;
        text-decoration:none;margin-bottom:10px;">💾 이미지 저장하기</a>
      <button onclick="
        if(navigator.share){
          fetch('${imgUrl}').then(r=>r.blob()).then(b=>{
            const f=new File([b],'공부체력유형.png',{type:'image/png'});
            navigator.share({title:'나의 공부체력 유형: ${typeName}',text:'공부가 안 되는 건 의지 문제가 아닙니다! 🧠',files:[f]});
          }).catch(()=>alert('공유를 지원하지 않는 환경입니다.'));
        } else { alert('이미지를 길게 눌러 저장 후 공유해주세요!'); }
      " style="width:100%;border:1px solid rgba(255,255,255,.2);border-radius:999px;
        padding:13px;font-weight:900;font-size:14px;
        background:rgba(255,255,255,.07);color:#fff;margin-bottom:10px;">📤 친구에게 공유하기</button>
      <button onclick="document.getElementById('shareModal').remove()" style="
        width:100%;background:transparent;border:1px solid rgba(255,255,255,.1);
        border-radius:999px;padding:12px;font-size:14px;color:rgba(255,255,255,.45);">닫기</button>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener("click",e=>{if(e.target===modal)modal.remove();});
}

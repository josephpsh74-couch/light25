function levelFromScore(sc){

// ===== DETECT PATTERN =====
function detectPattern(scores){
  const vals=S.map(s=>({id:s.id,t:s.t,em:s.em,sc:scores[s.id]}));
  const sorted=[...vals].sort((a,b)=>b.sc-a.sc);
  const hi=sorted[0],lo=sorted[4];
  const total=vals.reduce((a,v)=>a+v.sc,0);
  const highCount=vals.filter(v=>v.sc>=11).length;

  if(total<=25){
    const n=lang==="en"?"A Well-Tuned Bicycle":"잘 달리는 자전거";
    const s=lang==="en"?"Stable Study Pattern":"안정적 학습 패턴";
    const d=lang==="en"?`All five learning areas are well-managed. Your ${lo.em} ${EN.sections[lo.id].t} area (${lo.sc} pts) is a clear strength — extend those habits to other areas.`:`지금 당신의 학습 심리는 잘 정비된 자전거와 같아요. 5개 영역 모두 큰 어려움 없이 관리되고 있어요.\n\n🔑 ${lo.em} ${lo.t} 영역(${lo.sc}점)은 큰 강점이니, 이 영역의 습관을 다른 영역에도 확장해보세요.`;
    return{em:"✨",name:n,sub:s,desc:d,hi,lo};
  }
  if(total>50){
    const n=lang==="en"?"Sailing in Fog":"안개 속 항해";
    const s=lang==="en"?"Active management needed":"적극적 관리가 필요한 상태";
    const d=lang==="en"?`Multiple areas are under stress at once. The most urgent area is ${hi.em} ${EN.sections[hi.id].t} (${hi.sc} pts). Start there.`:`여러 영역에서 동시에 어려움을 경험하고 있어서, 어디서부터 손을 대야 할지 막막하게 느껴질 수 있습니다.\n\n🔑 지금 가장 시급한 영역은 ${hi.em} ${hi.t}(${hi.sc}점)이에요.`;
    return{em:"🆘",name:n,sub:s,desc:d,hi,lo};
  }
  if(scores.C>=11&&scores.D>=11){
    const d=lang==="en"?"You have focus ability and know the methods — but can't start. Psychology calls this 'learned helplessness.' Set impossibly small goals and complete one every day.":"집중력도 있고, 공부법도 알고 있어요. 그런데 시작이 안 되죠. 이건 게으름이 아니에요. 심리학에서는 이것을 '학습된 무기력'이라고 불러요.\n\n🔑 큰 목표는 잠시 내려놓으세요. 말도 안 될 정도로 작은 목표를 매일 하나씩 완료하세요.";
    return{em:"🧊",name:lang==="en"?"Winter of the Mind":"마음의 겨울",sub:lang==="en"?"Learned Helplessness Pattern":"무기력 고착 패턴",desc:d,hi,lo};
  }
  if(scores.A>=11&&scores.B>=11){
    const d=lang==="en"?"Anxiety pushes you to 'be perfect,' and that pressure causes your brain to escape to YouTube. The key is sequence: reduce anxiety first.":"한쪽에서는 불안이 '완벽하게 해야 해'라고 압박하고, 다른 쪽에서는 그 압박이 너무 크니까 뇌가 '그냥 유튜브나 보자'며 도망치려 해요.\n\n🔑 핵심은 순서예요. 먼저 불안을 낮추세요.";
    return{em:"🌀",name:lang==="en"?"The Anxiety-Impulse Seesaw":"불안이 충동을 부르는 시소",sub:lang==="en"?"Dual Vicious Cycle":"이중 악순환 패턴",desc:d,hi,lo};
  }
  if(scores.B>=11&&scores.E>=11){
    const d=lang==="en"?"You work hard, but results don't match effort. The engine spins, but the wheels slip. Before changing strategy, lower the anxiety.":"열심히 하고 있어요. 그런데 투입한 시간에 비해 결과가 안 나오죠? 마치 엔진은 세게 돌아가는데 바퀴가 헛도는 느낌.\n\n🔑 전략을 바꾸려 하기 전에, 불안부터 낮추세요.";
    return{em:"🎯",name:lang==="en"?"A Spinning Engine":"공회전하는 엔진",sub:lang==="en"?"Perfectionist Overload":"완벽주의 과부하 패턴",desc:d,hi,lo};
  }
  if(highCount===1){
    const danger=vals.find(v=>v.sc>=11)||hi;
    const nm=lang==="en"?EN.patternNames[danger.id]:{A:{n:"리모컨을 빼앗긴 뇌",s:"자극 과민 패턴"},B:{n:"보이지 않는 브레이크",s:"불안 우세 패턴"},C:{n:"시동이 꺼진 엔진",s:"동기 고갈 패턴"},D:{n:"출발선의 벽",s:"회피 고착 패턴"},E:{n:"나침반 없는 탐험가",s:"학습 자율성 부재 패턴"}}[danger.id]||{n:"학습 패턴",s:""};
    const descs={
      A:lang==="en"?"Your brain's reward circuit is overly sensitive to instant gratification. Don't try to resist with willpower — physically block the distractions.":"지금 당신의 뇌는 '자극 자판기' 앞에 서 있는 상태예요. 의지력으로 버티려 하지 말고, 유혹 자체를 물리적으로 차단하세요.",
      B:lang==="en"?"An invisible brake keeps pressing inside. Anxiety isn't about eliminating it — it's about regulating it.":"겉으로는 괜찮아 보이지만, 마음속에서 보이지 않는 브레이크가 계속 밟히고 있어요. 불안은 '없애는 것'이 아니라 '조절하는 것'이에요.",
      C:lang==="en"?"You know you should study, but your body doesn't move. Repeated failure has taught your brain 'trying is pointless.' Start with impossibly small wins.":"공부해야 한다는 건 아는데, 몸이 움직이지 않아요. 반복된 좌절이 뇌에 '해도 소용없다'는 신호를 심어놨어요. 말도 안 되게 작은 것부터 시작하세요.",
      D:lang==="en"?"You know exactly what to do — but starting feels like climbing a wall. The key is reducing starting friction, not building motivation.":"해야 할 걸 알면서도 시작이 안 돼요. 동기를 높이려 하기보다, 시작의 마찰을 줄이는 것이 핵심이에요.",
      E:lang==="en"?"You study, but real understanding isn't forming. Input without output creates an illusion of knowing. Try explaining what you learned without looking.":"공부는 하는데, 진짜 내 것이 안 되고 있어요. 넣기만 하고 꺼내지 않으면 아는 것처럼 느껴지지만 실제로는 모르는 거예요."
    };
    return{em:S.find(s=>s.id===danger.id)?.em||"📌",name:nm.n,sub:nm.s,desc:descs[danger.id]||"",hi,lo};
  }
  const nm2=lang==="en"?`${EN.sections[hi.id].t} & ${EN.sections[sorted[1].id].t} Mixed`:`${hi.t}+${sorted[1].t} 복합 패턴`;
  return{em:"📊",name:nm2,sub:lang==="en"?"Multiple Area Management":"복합 영역 관리",desc:lang==="en"?`Two areas need simultaneous attention: ${hi.em} ${EN.sections[hi.id].t} and ${sorted[1].em} ${EN.sections[sorted[1].id].t}. Start with the highest-scoring one.`:`${hi.em} ${hi.t}과 ${sorted[1].em} ${sorted[1].t} 두 영역이 동시에 관리가 필요한 상태예요. 가장 높은 영역부터 순서대로 접근해보세요.`,hi,lo};
}

// ===== MINI SUMMARY =====
function miniSummaryText(){
  if(!MINI_CTX||!MINI_CTX.scores)return "";
  const ids=["A","B","C","D","E"];
  const vals=ids.map(id=>({id,sc:MINI_CTX.scores[id]??0})).sort((a,b)=>b.sc-a.sc);
  const top1=vals[0],top2=vals[1];
  const nameMap=lang==="en"?{A:"⚡ Impulse",B:"🌊 Emotion",C:"🔋 Drive",D:"🐌 Action",E:"🧩 Strategy"}:{A:"⚡ 기질",B:"🌊 정서",C:"🔋 동기",D:"🐌 행동",E:"🧩 전략"};
  const name=(id)=>nameMap[id]||id;
  const mixed=vals.filter(v=>v.sc>=3).length>=2;
  const header=lang==="en"?"Mini result applied":"Mini 결과 반영됨";
  const mixLabel=mixed?(lang==="en"?"Mixed":"혼합"):(lang==="en"?"Key":"핵심");
  return header+"\n"+mixLabel+": "+name(top1.id)+" + "+name(top2.id);
}

    </div>
  </div>

  <div class="sp16"></div>

    </div>

    </a>

  <div class="card">

      <button onclick="captureResult()" id="captureBtn" style="flex:1;padding:13px;font-size:13px;font-weight:800;color:rgba(255,255,255,.8);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:14px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s" onmouseover="this.style.background='rgba(255,255,255,.10)'" onmouseout="this.style.background='rgba(255,255,255,.07)'">📷 ${lang==="en"?"Save Image":"이미지 저장"}</button>
      <button onclick="shareResult()" style="flex:1;padding:13px;font-size:13px;font-weight:800;color:rgba(255,255,255,.8);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:14px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s" onmouseover="this.style.background='rgba(255,255,255,.10)'" onmouseout="this.style.background='rgba(255,255,255,.07)'">🔗 ${lang==="en"?"Share":"공유"}</button>
    </div>
    <div style="text-align:center">
      <button onclick="ans={};cSec=0;cQ=0;phase='intro';render()" style="padding:12px 32px;font-size:13px;font-weight:700;color:rgba(255,255,255,.45);background:transparent;border:1px solid rgba(255,255,255,.10);border-radius:999px;transition:all .15s" onmouseover="this.style.color='rgba(255,255,255,.7)'" onmouseout="this.style.color='rgba(255,255,255,.45)'">${lang==="en"?"Retake":"다시 검사하기"}</button>

        ${lang==="en"?"This tool is not intended as medical or clinical diagnosis. Results are reference material for improving study habits and do not replace mental health diagnosis or treatment. If you experience persistent psychological difficulties, consult a licensed professional. All content is copyrighted.":"본 도구는 의학적·임상적 진단을 목적으로 하지 않는 교육적 자기점검 도구입니다. 결과는 학습 습관 개선을 위한 참고 자료이며, 정신건강 관련 진단이나 치료를 대체하지 않습니다. 지속적인 어려움이 있을 경우, 반드시 전문가와 상의하시기 바랍니다. 본 콘텐츠에 대한 저작권은 개발자에게 있으며, 무단 복제·배포를 금합니다."}
      </p>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:10px;color:rgba(255,255,255,.2)">&copy; 2026 공부체력진단 25 · Study Fitness Check 25 &middot; Scene코치</div>
  </div>`;

  // 미션 카드 이벤트
  setTimeout(()=>{
    document.querySelectorAll("#missionGrid .mission-card").forEach(btn=>{
      btn.addEventListener("click",()=>{
        document.querySelectorAll("#missionGrid .mission-card").forEach(b=>b.classList.remove("selected"));
        btn.classList.add("selected");
        const h=btn.querySelector(".mission-head");
        const hint=document.getElementById("missionHint");
        if(hint&&h){hint.innerHTML=`✅ <b>${h.textContent}</b> ${lang==="en"?"selected! Note how you feel after 5 minutes 🧠":"선택 완료! 5분 후 달라진 점을 기억해두세요 🧠"}`;hint.style.color="rgba(185,255,214,.85)";}
      });
    });

}

// ===== ACCORDION TOGGLES =====
function toggleRoutine(key){
  const body=document.getElementById("body-"+key);
  const arrow=document.getElementById("arrow-"+key);
  if(!body)return;
  body.classList.toggle("open");
  if(arrow)arrow.textContent=body.classList.contains("open")?"▲":"▼";
}
function toggleDetail(key){
  const body=document.getElementById("dbody-"+key);
  const arrow=document.getElementById("darrow-"+key);
  if(!body)return;
  body.classList.toggle("open");
  if(arrow)arrow.textContent=body.classList.contains("open")?"▲":"▼";
}

// ===== SHARE / CAPTURE =====
function captureResult(){
  const el=document.getElementById("app");
  if(!el)return;
  const btn=document.getElementById("captureBtn");
  document.body.classList.add("shareMode");
  if(typeof html2canvas==="undefined"){
    const sc=document.createElement("script");
    sc.src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js";
    sc.onload=()=>doCapture(el,btn);
    document.head.appendChild(sc);
  }else{doCapture(el,btn);}
}
function doCapture(el,btn){
  html2canvas(el,{backgroundColor:"#0b1024",scale:2,useCORS:true}).then(canvas=>{
    document.body.classList.remove("shareMode");
    const link=document.createElement("a");
    link.download=(lang==="en"?"SFC25_Result_":"공부체력진단25_결과_")+new Date().toISOString().slice(0,10)+".png";
    link.href=canvas.toDataURL("image/png");
    link.click();
  }).catch(()=>{document.body.classList.remove("shareMode");alert(lang==="en"?"Save failed. Please take a screenshot.":"저장 실패. 스크린샷으로 저장해주세요.");});
}
function shareResult(){
  const title=lang==="en"?"Study Fitness Check 25 Result":"공부체력진단 25 결과";
  const text=lang==="en"?"I checked my study execution pattern. Want to try?":"공부체력진단25로 학습 실행 패턴을 확인해봤어요. 너도 해볼래?";
  const url=window.location.href;
  if(navigator.share){navigator.share({title,text,url}).catch(()=>{});return;}
  const payload=`${title}\n${text}\n${url}`;
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(payload).then(()=>{alert(lang==="en"?"Link copied!":"링크가 복사되었습니다!");}).catch(()=>{prompt(lang==="en"?"Copy below:":"아래를 복사해 주세요:",payload);});}
  else{prompt(lang==="en"?"Copy below:":"아래를 복사해 주세요:",payload);}
}

render();
</script>
